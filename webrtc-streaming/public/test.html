<!DOCTYPE html>
<html>
<head>
  <title>测试</title>
</head>
<body>
  <h1>测试页面</h1>
  <button id="testBtn">点击测试</button>
  
  <script>
    console.log('✅ JavaScript 正在运行');

    });
  </script>
</body>
</html>
