<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>阶段5: WebRTC + RTMP 直播播放器</title>
  <script src="hls.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    header p {
      font-size: 1.2em;
      opacity: 0.9;
    }

    .main-content {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }

    .video-container {
      position: relative;
      background: #000;
      padding-top: 56.25%; /* 16:9 */
    }

    #video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-controls {
      padding: 20px;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #333;
    }

    .control-group input,
    .control-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .info-section {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .info-section h3 {
      margin-bottom: 15px;
      color: #333;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .stat-item {
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      color: white;
    }

    .stat-label {
      font-size: 12px;
      opacity: 0.9;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .alert {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .alert-info {
      background: #dbeafe;
      border-left: 4px solid #3b82f6;
      color: #1e40af;
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 阶段5: WebRTC + RTMP 直播播放器</h1>
      <p>支持两种推流方式：网页 WebRTC 推流 + OBS RTMP 推流</p>
    </header>

    <div class="alert alert-info">
      <strong>💡 推流方式:</strong><br>
      <strong>方式1:</strong> 网页推流 → 访问 <code>/stream.html</code><br>
      <strong>方式2:</strong> OBS 推流 → <code>rtmp://localhost:1935/live/stream_key</code>
    </div>

    <div class="main-content">
      <div class="video-container">
        <video id="video" controls autoplay muted playsinline webkit-playsinline></video>
      </div>

      <div class="video-controls">
        <div class="control-group">
          <label for="streamKey">流密钥</label>
          <input type="text" id="streamKey" value="webrtc_stream" placeholder="输入流密钥">
        </div>

        <div class="control-group">
          <button id="playBtn">▶️ 开始播放</button>
        </div>

        <div class="control-group">
          <label>HLS 播放地址</label>
          <input type="text" id="hlsUrl" readonly value="">
        </div>
      </div>
    </div>

    <div class="info-section">
      <h3>📊 播放统计</h3>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-label">当前画质</div>
          <div class="stat-value" id="currentLevel">-</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">缓冲健康度</div>
          <div class="stat-value" id="bufferHealth">0s</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">推流方式</div>
          <div class="stat-value" id="streamType">未知</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">播放状态</div>
          <div class="stat-value" id="playStatus">空闲</div>
        </div>
      </div>
    </div>

    <div class="info-section">
      <h3>📡 推流信息</h3>
      <p><strong>网页推流:</strong> 访问 <a href="/stream.html" target="_blank">/stream.html</a></p>
      <p><strong>OBS 推流:</strong></p>
      <ul style="margin-left: 20px; margin-top: 10px;">
        <li>服务器: <code>rtmp://localhost:1935/live</code></li>
        <li>串流密钥: <code id="currentStreamKey">stream_key</code></li>
      </ul>
    </div>
  </div>

  <script>
    let hls = null;
    let isPlaying = false;

    const video = document.getElementById('video');
    const streamKeyInput = document.getElementById('streamKey');
    const hlsUrlInput = document.getElementById('hlsUrl');
    const playBtn = document.getElementById('playBtn');
    const currentLevelEl = document.getElementById('currentLevel');
    const bufferHealthEl = document.getElementById('bufferHealth');
    const streamTypeEl = document.getElementById('streamType');
    const playStatusEl = document.getElementById('playStatus');
    const currentStreamKeyEl = document.getElementById('currentStreamKey');

    // 初始化 HLS URL (页面加载时)
    // 使用当前页面的协议和端口，通过代理访问 HLS
    const protocol = window.location.protocol; // http: 或 https:
    const host = window.location.host; // 包含端口，如 192.168.2.15:6443
    const initialKey = streamKeyInput.value || 'stream_key';
    hlsUrlInput.value = `${protocol}//${host}/live/${initialKey}/index.m3u8`;

    // 更新 HLS URL
    streamKeyInput.addEventListener('input', () => {
      const key = streamKeyInput.value || 'stream_key';
      hlsUrlInput.value = `${protocol}//${host}/live/${key}/index.m3u8`;
      currentStreamKeyEl.textContent = key;
    });

    // 播放按钮
    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        stopStream();
      } else {
        playStream();
      }
    });

    // 播放直播流
    async function playStream() {
      const streamUrl = hlsUrlInput.value;

      // 先检查 HLS 文件是否存在
      try {
        const response = await fetch(streamUrl, { method: 'HEAD' });
        if (!response.ok) {
          console.warn(`⚠️ HLS 文件不存在 (${response.status})，可能推流还未开始或已结束`);
          alert('直播流不存在\n\n可能原因：\n1. 推流还未开始\n2. 流密钥不正确\n3. HLS 切片还在生成中（需要等待5-10秒）');
          return;
        }
        console.log('✅ HLS 文件存在，开始加载...');
      } catch (error) {
        console.error('❌ 检查 HLS 文件失败:', error);
        alert(`无法访问 HLS 文件\n\n错误: ${error.message}\n\n请检查：\n1. 网络连接\n2. 服务器是否运行\n3. 端口 8000 是否可访问`);
        return;
      }

      if (Hls.isSupported()) {
        if (hls) {
          hls.destroy();
        }

        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,  // 禁用低延迟模式以优先保证流畅性
          backBufferLength: 90,
          maxBufferLength: 60,    // 增加缓冲区长度
          maxMaxBufferLength: 120, // 增加最大缓冲区长度
          maxBufferSize: 60 * 1000 * 1000, // 60MB
          maxBufferHole: 0.5,     // 缓冲区空洞容忍度
          highBufferWatchdogPeriod: 3,
          nudgeOffset: 0.1,
          nudgeMaxRetry: 5,
          maxFragLookUpTolerance: 0.25,
          liveSyncDurationCount: 3, // 增加同步段数
          liveMaxLatencyDurationCount: 10,
          liveDurationInfinity: false,
          manifestLoadingTimeOut: 10000,
          manifestLoadingMaxRetry: 3,
          manifestLoadingRetryDelay: 500,
          levelLoadingTimeOut: 10000,
          levelLoadingMaxRetry: 4,
          fragLoadingTimeOut: 20000,
          fragLoadingMaxRetry: 6,
          fragLoadingRetryDelay: 1000,
          startFragPrefetch: true, // 启用预加载
          testBandwidth: true
        });

        hls.loadSource(streamUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          console.log('✅ HLS manifest 已加载');
          video.play().catch(err => {
            console.error('播放失败:', err);
          });
          isPlaying = true;
          playBtn.textContent = '⏸️ 停止播放';
          playStatusEl.textContent = '播放中';

          // 检测推流方式
          const streamKey = streamKeyInput.value;
          if (streamKey.includes('webrtc')) {
            streamTypeEl.textContent = 'WebRTC';
          } else {
            streamTypeEl.textContent = 'RTMP';
          }
        });

        hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
          const level = hls.levels[data.level];
          currentLevelEl.textContent = level ? `${level.height}p` : '-';
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error('HLS 错误详情:', {
            type: data.type,
            details: data.details,
            fatal: data.fatal,
            url: data.url,
            response: data.response,
            reason: data.reason
          });

          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                console.log('⚠️ 网络错误，尝试重连...', data.details);
                setTimeout(() => hls.startLoad(), 1000);
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log('⚠️ 媒体错误，尝试恢复...', data.details);
                hls.recoverMediaError();
                break;
              default:
                console.error('❌ 致命错误，无法播放:', data.details);
                alert(`播放失败: ${data.details}\n请检查流密钥是否正确，以及推流是否正在进行`);
                stopStream();
                break;
            }
          } else {
            // 非致命错误处理
            if (data.details === 'bufferStalledError') {
              console.warn('⚠️ 缓冲区不足，尝试优化...');
              // 尝试从稍早的位置重新加载
              if (hls && video.buffered.length > 0) {
                const bufferEnd = video.buffered.end(video.buffered.length - 1);
                if (bufferEnd - video.currentTime < 0.5) {
                  // 缓冲区几乎耗尽，重新加载
                  hls.startLoad(video.currentTime - 1);
                }
              }
            } else if (data.details === 'bufferAppendingError') {
              console.warn('⚠️ 缓冲区追加错误，尝试恢复...');
              hls.recoverMediaError();
            } else {
              console.warn('⚠️ HLS 警告:', data.details);
            }
          }
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari 原生支持
        video.src = streamUrl;
        video.addEventListener('loadedmetadata', () => {
          video.play();
          isPlaying = true;
          playBtn.textContent = '⏸️ 停止播放';
          playStatusEl.textContent = '播放中';
        });
      } else {
        alert('您的浏览器不支持 HLS 播放');
      }
    }

    // 停止播放
    function stopStream() {
      if (hls) {
        hls.destroy();
        hls = null;
      }
      video.pause();
      video.src = '';
      isPlaying = false;
      playBtn.textContent = '▶️ 开始播放';
      currentLevelEl.textContent = '-';
      playStatusEl.textContent = '空闲';
      streamTypeEl.textContent = '未知';
    }

    // 更新缓冲健康度
    setInterval(() => {
      if (video.buffered.length > 0) {
        const buffered = video.buffered.end(video.buffered.length - 1) - video.currentTime;
        bufferHealthEl.textContent = buffered.toFixed(1) + 's';
      }
    }, 1000);
  </script>
</body>
</html>
